    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },

                        bglight: '#f6f6f6',

            var menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');

</html>
