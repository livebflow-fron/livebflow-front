<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Kanban - Liveb Bank S/A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#0047ba',
                        secondary: '#004c99',
                        bglight: '#f6f6f6',
                        colbg: '#e5e6e6'
                    }
                }
            }
        }
    </script>
    <style>
        .cartao-proposta { cursor: grab; transition: transform 0.1s; }
        .cartao-proposta:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-primary md:bg-bglight text-slate-800 font-sans min-h-screen flex flex-col md:flex-row">

    <!-- Mobile Header -->
    <div class="md:hidden bg-primary text-white p-4 flex justify-between items-center shadow-md z-10">
        <img src="../static/images/liveb-logo-branco.svg" onerror="this.src='../static/images/liveb-logo.png'" alt="Liveb Bank S/A" class="h-8">
        <button id="mobile-menu-btn" class="focus:outline-none"><i class="bi bi-list text-3xl"></i></button>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="hidden md:hidden bg-primary text-white w-full absolute top-16 left-0 z-20 shadow-xl flex-col divide-y divide-secondary">
        <a href="../index.html" class="block py-4 px-6 hover:bg-secondary">Início</a>
        <a href="kanban.html" class="block py-4 px-6 bg-secondary font-bold">Propostas</a>
        <a href="calendario.html" class="block py-4 px-6 hover:bg-secondary">Calendário</a>
        <a href="login/index.html" class="block py-4 px-6 hover:bg-secondary">Sair</a>
    </div>

    <!-- Desktop Sidebar -->
    <div class="hidden md:flex flex-col w-64 bg-primary text-white h-screen fixed inset-y-0 left-0 z-50">
        <div class="p-6">
            <img src="../static/images/liveb-logo-branco.svg" onerror="this.src='../static/images/liveb-logo.png'" alt="Liveb Bank S/A" class="h-12 mb-8 object-contain">
        </div>
        <div class="flex flex-col px-4 space-y-2 flex-grow">
            <a href="../index.html" class="px-4 py-3 rounded-md hover:bg-secondary transition-colors">Início</a>
            <a href="kanban.html" class="px-4 py-3 rounded-md bg-secondary font-bold shadow-inner">Propostas</a>
            <a href="calendario.html" class="px-4 py-3 rounded-md hover:bg-secondary transition-colors">Calendário</a>
        </div>
        <div class="p-4 mb-4 mt-auto">
            <a href="login/index.html" class="block w-full text-center px-4 py-3 rounded-md hover:bg-secondary transition-colors text-white font-medium">Sair</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 md:ml-64 bg-bglight p-4 md:p-8 min-h-screen rounded-tl-3xl rounded-bl-3xl overflow-x-hidden md:mt-0">
        
        <div class="flex flex-col md:flex-row gap-6 md:h-[85vh]">
            
            <!-- Coluna A Fazer -->
            <div class="flex-1 bg-colbg rounded-xl p-4 min-w-[280px] flex flex-col shadow-sm" id="coluna-a-fazer" ondragover="permitirSoltar(event)" ondrop="soltar(event, 'A Fazer')">
                <h3 class="text-center font-bold text-primary mb-4 pb-2 border-b-2 border-slate-300">A Fazer</h3>
            </div>

            <!-- Coluna Em andamento -->
            <div class="flex-1 bg-colbg rounded-xl p-4 min-w-[280px] flex flex-col shadow-sm" id="coluna-em-analise" ondragover="permitirSoltar(event)" ondrop="soltar(event, 'Em Análise')">
                <h3 class="text-center font-bold text-primary mb-4 pb-2 border-b-2 border-slate-300">Em andamento</h3>
            </div>

            <!-- Coluna Concluído -->
            <div class="flex-1 bg-colbg rounded-xl p-4 min-w-[280px] flex flex-col shadow-sm" id="coluna-aprovada" ondragover="permitirSoltar(event)" ondrop="soltar(event, 'Aprovada')">
                <h3 class="text-center font-bold text-primary mb-4 pb-2 border-b-2 border-slate-300">Concluído</h3>
            </div>

        </div>
    </div>

    <script>
        // Mobile menu toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            var menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        });

        async function carregarPropostas() {
            try {
                // Try fetching from backend
                const resposta = await fetch('/api/propostas');
                if(!resposta.ok) throw new Error("Erro na rede");
                const propostas = await resposta.json();

                renderizarKanban(propostas);
            } catch (erro) {
                console.error("Erro ao conectar com a API: ", erro);
                // Placeholder para demonstração visual, já que não temos o banco rodando
                renderizarKanban([
                    {id: 1, nomeImobiliaria: "Imobiliária X", nomeInquilino: "João", valorAluguel: 2500, statusKanban: "A Fazer"},
                    {id: 2, nomeImobiliaria: "Imobiliária Y", nomeInquilino: "Pedro", valorAluguel: 1800, statusKanban: "Em Análise"},
                    {id: 3, nomeImobiliaria: "Imobiliária A", nomeInquilino: "Ana", valorAluguel: 3200, statusKanban: "Aprovada"}
                ]);
            }
        }

        function renderizarKanban(propostas) {
            propostas.forEach(proposta => {
                const valorFormatado = proposta.valorAluguel.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                const cartao = `
                    <div class="cartao-proposta bg-white p-4 rounded-lg shadow-md mb-3 border-l-4 border-primary" id="proposta-${proposta.id}" draggable="true" ondragstart="arrastar(event)">
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="font-bold text-primary text-sm m-0">Proposta ${String(proposta.id).padStart(3, '0')}</h4>
                        </div>
                        <p class="text-xs text-slate-600 mb-1"><strong>Imobiliária:</strong> ${proposta.nomeImobiliaria}</p>
                        <p class="text-xs text-slate-600 mb-1"><strong>Cliente:</strong> ${proposta.nomeInquilino}</p>
                        <p class="text-xs text-slate-500 mt-2">Valor: R$ ${valorFormatado}</p>
                    </div>
                `;
                if (proposta.statusKanban === 'A Fazer') {
                    document.getElementById('coluna-a-fazer').innerHTML += cartao;
                } else if (proposta.statusKanban === 'Em Análise') {
                    document.getElementById('coluna-em-analise').innerHTML += cartao;
                } else if (proposta.statusKanban === 'Aprovada') {
                    document.getElementById('coluna-aprovada').innerHTML += cartao;
                }
            });
        }

        function arrastar(event) { event.dataTransfer.setData("idCartao", event.target.id); }
        function permitirSoltar(event) { event.preventDefault(); }
        async function soltar(event, novoStatus) {
            event.preventDefault();
            const idCartao = event.dataTransfer.getData("idCartao");
            const idBanco = idCartao.split("-")[1];
            const cartao = document.getElementById(idCartao);

            let alvo = event.target;
            while (!alvo.classList.contains('bg-colbg')) { alvo = alvo.parentElement; }
            
            // Append right after the h3
            alvo.appendChild(cartao);

            try {
                await fetch(`/api/propostas/${idBanco}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ statusKanban: novoStatus })
                });
            } catch (erro) { console.error("Erro ao atualizar o banco: ", erro); }
        }

        window.onload = carregarPropostas;
    </script>
</body>
</html>
