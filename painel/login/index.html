<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Liveb Bank S/A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#0047ba',
                        button: '#5b21b6' /* Roxo do botão nas imagens */
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-primary flex flex-col items-center justify-center p-4 font-sans">
    
    <!-- Header/Logo Section -->
    <div class="text-center mb-8 flex flex-col items-center">
        <div class="w-24 h-24 bg-white rounded-2xl shadow flex items-center justify-center mb-4 p-2">
            <img src="../../static/images/liveb-logo-azul.svg" onerror="this.src='../../static/images/liveb-logo.png'" alt="Liveb Bank S/A" class="object-contain max-h-full max-w-full">
        </div>
        <h1 class="text-2xl font-bold text-white mb-1">Painel do Parceiro</h1>
        <p class="text-white/80 text-sm">Acesse sua conta</p>
    </div>

    <!-- Main Card -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-[400px] p-8 box-border">
        
        <form id="login-form" class="space-y-5" onsubmit="event.preventDefault(); window.location.href='../../painel-interno.html';">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">E-mail</label>
                <input type="email" name="email" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" placeholder="seu@email.com" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Senha</label>
                <div class="relative">
                    <input type="password" name="senha" id="password" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm pr-10" placeholder="Sua senha" required>
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                        <i id="toggleIcon" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between mt-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <span class="text-xs text-slate-600">Lembrar-me</span>
                </label>
                <a href="../senha/recuperar/index.html" class="text-xs text-primary font-medium hover:underline">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="w-full bg-button hover:bg-[#4c1d95] text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 mt-4 text-sm">
                <i class="bi bi-box-arrow-in-right"></i>
                Entrar
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-slate-500">
            ou
        </div>

        <div class="mt-4 text-center">
            <p class="text-xs text-slate-500 mb-3">Ainda não tem uma conta?</p>
            <a href="../../seja-parceiro/index.html" class="text-primary font-bold text-sm border-2 border-primary rounded-lg py-2 px-6 inline-block hover:bg-primary hover:text-white transition-colors">
                Seja Parceiro
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center">
        <a href="../../index.html" class="text-sm text-white/70 hover:text-white transition-colors flex items-center gap-2 justify-center">
            <i class="bi bi-arrow-left"></i> Voltar ao site
        </a>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>
