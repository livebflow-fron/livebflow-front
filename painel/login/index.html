
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Liveb Bank</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS + DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'liveb-blue': '#1a3a6e',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-liveb-blue to-blue-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-28 h-28 bg-white rounded-2xl shadow-lg mb-4 p-3">
                <img src="../../static/images/liveb-logo.png" alt="Liveb Bank" class="h-16 w-auto object-contain">
            </div>
            <h1 class="text-2xl font-bold text-white">Painel do Parceiro</h1>
            <p class="text-white/70 mt-1">Acesse sua conta</p>
        </div>

        <!-- Login Card -->
        <div class="card bg-white shadow-xl">
            <div class="card-body">
                

                

                <form method="POST" action="/api/login" class="space-y-4">
                    <input type="hidden" name="csrfmiddlewaretoken" value="Jk7DlDHgdaM3zZc6dj0B0IXY0ul7YCf4oWko38sFbEbutvucB84XyyHaBnDIsRCy">

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-medium">E-mail</span>
                        </label>
                        <input type="email" name="email" class="input input-bordered w-full" placeholder="seu@email.com" autofocus maxlength="150" required id="id_username">
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-medium">Senha</span>
                        </label>
                        <div class="relative">
                            <input type="password" name="senha" id="password" required
                                   class="input input-bordered w-full pr-10"
                                   placeholder="Sua senha">
                            <button type="button" onclick="togglePassword('password', 'toggleIcon1')"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                <i id="toggleIcon1" class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="label cursor-pointer gap-2">
                            <input type="checkbox" class="checkbox checkbox-sm checkbox-primary">
                            <span class="label-text">Lembrar-me</span>
                        </label>
                        <a href="../senha/recuperar/index.html" class="text-sm text-primary hover:underline">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-full">
                        <i class="bi bi-box-arrow-in-right mr-2"></i>
                        Entrar
                    </button>
                </form>

                <div class="divider">ou</div>

                <div class="text-center">
                    <p class="text-sm text-gray-500 mb-2">Ainda não tem uma conta?</p>
                    <a href="../../seja-parceiro/index.html" class="btn btn-outline btn-primary btn-sm">
                        Seja Parceiro
                    </a>
                </div>
            </div>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-6">
            <a href="../../index.html" class="text-white/70 hover:text-white transition">
                <i class="bi bi-arrow-left mr-1"></i>
                Voltar ao site
            </a>
        </div>
    </div>
<script>
function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}
</script>
</body>
</html>
