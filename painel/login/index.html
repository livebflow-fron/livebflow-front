<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Liveb Bank S/A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#0047ba',
                        button: '#5b21b6' /* Roxo do botão nas imagens */
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-primary flex flex-col items-center justify-center p-4 font-sans">
    
    <!-- Header/Logo Section -->
    <div class="text-center mb-8 flex flex-col items-center">
        <div class="w-24 h-24 bg-white rounded-2xl shadow flex items-center justify-center mb-4 p-2">
            <img src="../../static/images/liveb-logo-azul.svg" onerror="this.src='../../static/images/liveb-logo.png'" alt="Liveb Bank S/A" class="object-contain max-h-full max-w-full">
        </div>
        <h1 class="text-2xl font-bold text-white mb-1">Painel do Parceiro</h1>
        <p class="text-white/80 text-sm">Acesse sua conta</p>
    </div>

        <!-- Login Card -->
        <div class="card bg-white shadow-xl">
            <div class="card-body">

                <!-- Mensagem de erro -->
                <div id="login-error" class="hidden alert alert-error text-sm py-2 px-4 mb-2">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span id="login-error-msg">Email ou senha inválidos.</span>
                </div>

                <form id="login-form" class="space-y-4">

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-medium">E-mail</span>
                        </label>
                        <input type="email" name="email" class="input input-bordered w-full" placeholder="seu@email.com" autofocus maxlength="150" required id="id_username">
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-medium">Senha</span>
                        </label>
                        <div class="relative">
                            <input type="password" name="senha" id="password" required
                                   class="input input-bordered w-full pr-10"
                                   placeholder="Sua senha">
                            <button type="button" onclick="togglePassword('password', 'toggleIcon1')"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                <i id="toggleIcon1" class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="label cursor-pointer gap-2">
                            <input type="checkbox" class="checkbox checkbox-sm checkbox-primary">
                            <span class="label-text">Lembrar-me</span>
                        </label>
                        <a href="../senha/recuperar/index.html" class="text-sm text-primary hover:underline">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" id="btn-login" class="btn btn-primary w-full">
                        <i class="bi bi-box-arrow-in-right mr-2"></i>
                        Entrar
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between mt-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <span class="text-xs text-slate-600">Lembrar-me</span>
                </label>
                <a href="../senha/recuperar/index.html" class="text-xs text-primary font-medium hover:underline">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="w-full bg-button hover:bg-[#4c1d95] text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 mt-4 text-sm">
                <i class="bi bi-box-arrow-in-right"></i>
                Entrar
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-slate-500">
            ou
        </div>

        <div class="mt-4 text-center">
            <p class="text-xs text-slate-500 mb-3">Ainda não tem uma conta?</p>
            <a href="../../seja-parceiro/index.html" class="text-primary font-bold text-sm border-2 border-primary rounded-lg py-2 px-6 inline-block hover:bg-primary hover:text-white transition-colors">
                Seja Parceiro
            </a>
        </div>
    </div>
<script>
function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}

// Redireciona se já estiver logado
if (localStorage.getItem('token')) {
    window.location.href = '../../painel-interno.html';
}

document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    const errorBox = document.getElementById('login-error');
    const errorMsg = document.getElementById('login-error-msg');
    const btn = document.getElementById('btn-login');

    errorBox.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> Entrando...';

    const payload = {
        email: document.getElementById('id_username').value,
        senha: document.getElementById('password').value
    };

    try {
        const response = await fetch('http://localhost:8080/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => null);

        if (!response.ok) {
            errorMsg.textContent = data?.message || 'Email ou senha inválidos.';
            errorBox.classList.remove('hidden');
            return;
        }

        // Salva token e dados do usuário
        localStorage.setItem('token', data.token);
        localStorage.setItem('perfil', data.perfil);
        localStorage.setItem('email', data.email);

        // Redireciona para o painel interno
        window.location.href = '../../painel-interno.html';

    } catch (err) {
        errorMsg.textContent = 'Não foi possível conectar ao servidor. Tente novamente.';
        errorBox.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right mr-2"></i> Entrar';
    }
});
</script>

    <!-- Footer -->
    <div class="mt-8 text-center">
        <a href="../../index.html" class="text-sm text-white/70 hover:text-white transition-colors flex items-center gap-2 justify-center">
            <i class="bi bi-arrow-left"></i> Voltar ao site
        </a>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>
