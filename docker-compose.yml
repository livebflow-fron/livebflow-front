version: '3.8'

services:
  db:
    image: postgres:15
    container_name: liveb_db
    environment:
      POSTGRES_USER: livebbank
      POSTGRES_PASSWORD: livebbank_pass
      POSTGRES_DB: livebbank
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: 
      context: ./backend
    container_name: liveb_api
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/livebbank
      - SPRING_DATASOURCE_USERNAME=livebbank
      - SPRING_DATASOURCE_PASSWORD=livebbank_pass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: liveb_frontend
    ports:
      - "3020:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  pgdata:
